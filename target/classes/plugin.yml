name: SulfurFun
description: $description
version: '0.0.1-Experimental'

main: de.jgaertig.sulfurFun.SulfurFun
api-version: '26.1.2'

authors: [ j-gaertig ]
website: https://github.com/j-gaertig/SulfurFun

commands:
  newgame:
    permission: op
    permission-message: "Warning: This Command is for Server OPs only!"
    usage: "/newgame <type_of_minigame> <name_of_your_arena>"
  deletegame:
    permission: op
    permission-message: "Warning: This Command is for Server OPs only!"
    usage: "/deletegame <name_of_existing_arena>"